markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true

collections:
  projects:
    output: true
    permalink: /project-:name.html

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - README.md
  - "*.mjs"
