<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Analytics, training guides and feedback surveys via Pendo.io</title>
  <desc id="desc">Three-panel interface: product analytics dashboard on the left, an in-app Pendo training guide overlay in the centre, and a standardised feedback survey on the right.</desc>

  <rect width="1280" height="720" fill="#f7f9fc"/>
