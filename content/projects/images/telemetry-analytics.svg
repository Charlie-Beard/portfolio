  <circle cx="878" cy="262" r="13" fill="#edf4ff" stroke="#c4d0e0" stroke-width="2"/>
  <circle cx="914" cy="262" r="13" fill="#edf4ff" stroke="#c4d0e0" stroke-width="2"/>
  <circle cx="950" cy="262" r="13" fill="#edf4ff" stroke="#c4d0e0" stroke-width="2"/>
  <circle cx="986" cy="262" r="13" fill="#1f5fd6"/>
  <circle cx="1022" cy="262" r="13" fill="#edf4ff" stroke="#c4d0e0" stroke-width="2"/>
  <circle cx="1058" cy="262" r="13" fill="#edf4ff" stroke="#c4d0e0" stroke-width="2"/>
  <circle cx="1094" cy="262" r="13" fill="#edf4ff" stroke="#c4d0e0" stroke-width="2"/>

