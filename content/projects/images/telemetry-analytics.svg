  <rect x="868" y="358" width="264" height="8" rx="4" fill="#7d8ca0" opacity="0.2"/>
  <rect x="868" y="374" width="236" height="8" rx="4" fill="#7d8ca0" opacity="0.15"/>
  <rect x="868" y="390" width="180" height="8" rx="4" fill="#7d8ca0" opacity="0.12"/>

  <!-- Q3: Multiple choice -->
  <rect x="848" y="432" width="304" height="40" rx="12" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <rect x="848" y="480" width="304" height="40" rx="12" fill="#edf4ff" stroke="#c4d0e0" stroke-width="2"/>
  <rect x="848" y="528" width="304" height="40" rx="12" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <circle cx="874" cy="452" r="7" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <circle cx="874" cy="500" r="7" fill="#1f5fd6"/>
  <circle cx="874" cy="548" r="7" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
