  <line x1="152" y1="452" x2="406" y2="452" stroke="#dbe3ee" stroke-width="1"/>
  <path d="M152 446 L200 424 L252 434 L304 392 L356 402 L402 360 L402 454 L152 454 Z" fill="#1f5fd6" opacity="0.07"/>
