<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#ffffff"/>
  <!-- Frame: top / bottom / left = dark navy; right = brand blue accent -->
  <rect x="14" y="15" width="72" height="6" fill="#122033"/>
  <rect x="14" y="79" width="72" height="6" fill="#122033"/>
  <rect x="14" y="15" width="6" height="70" fill="#122033"/>
  <rect x="80" y="15" width="6" height="70" fill="#1f5fd6"/>
  <!-- CB monogram -->
  <text x="50" y="66"
        font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif"
        font-size="38"
        font-weight="700"
        fill="#122033"
        text-anchor="middle"
        dominant-baseline="auto">CB</text>
</svg>
